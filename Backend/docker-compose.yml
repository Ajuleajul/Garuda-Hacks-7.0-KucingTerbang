services:
  api:
    build: .
    image: curamind-api:latest
    container_name: curamind-api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
